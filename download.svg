<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#22D3EE">
<animate attributeName="stop-color" values="#22D3EE;#3B82F6;#8B5CF6;#22D3EE" dur="8s" repeatCount="indefinite"></animate>
</stop>

<stop offset="100%" stop-color="#8B5CF6">
<animate attributeName="stop-color" values="#8B5CF6;#22D3EE;#3B82F6;#8B5CF6" dur="8s" repeatCount="indefinite"></animate>
</stop>
</linearGradient>

<filter id="glow">
<feGaussianBlur stdDeviation="6" result="blur"></feGaussianBlur>
<feMerge>
<feMergeNode in="blur"></feMergeNode>
<feMergeNode in="SourceGraphic"></feMergeNode>
</feMerge>
</filter>

</defs>

<rect width="1200" height="320" fill="#0D1117"></rect>

<g opacity="0.07">

<path d="M0 60H1200"></path>
<path d="M0 120H1200"></path>
<path d="M0 180H1200"></path>
<path d="M0 240H1200"></path>
<path d="M0 300H1200"></path>

<path d="M100 0V320"></path>
<path d="M250 0V320"></path>
<path d="M400 0V320"></path>
<path d="M550 0V320"></path>
<path d="M700 0V320"></path>
<path d="M850 0V320"></path>
<path d="M1000 0V320"></path>
<path d="M1150 0V320"></path>

</g>

<text x="600" y="125" font-size="58" font-family="Inter,Segoe UI,sans-serif" font-weight="700" text-anchor="middle" fill="url(#gradient)" filter="url(#glow)">

ARPAN BARAL

<animateTransform attributeName="transform" type="translate" values="0 0;0 -2;0 0" dur="5s" repeatCount="indefinite"></animateTransform>

</text>

<text x="600" y="165" font-size="22" font-family="Inter,Segoe UI,sans-serif" text-anchor="middle" fill="#E5E7EB">

Python Developer • Future Machine Learning Engineer

</text>

<text x="600" y="205" font-size="18" font-family="Inter,Segoe UI,sans-serif" text-anchor="middle" fill="#94A3B8">

Building practical software today while learning the future of AI.

</text>

<circle cx="200" cy="70" r="2" fill="#22D3EE">
<animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"></animate>
</circle>

<circle cx="1000" cy="80" r="2" fill="#8B5CF6">
<animate attributeName="opacity" values="1;0;1" dur="6s" repeatCount="indefinite"></animate>
</circle>

<circle cx="320" cy="260" r="2" fill="#3B82F6">
<animate attributeName="opacity" values="0;1;0" dur="5s" repeatCount="indefinite"></animate>
</circle>

<circle cx="900" cy="260" r="2" fill="#22D3EE">
<animate attributeName="opacity" values="1;0;1" dur="7s" repeatCount="indefinite"></animate>
</circle>

</svg>